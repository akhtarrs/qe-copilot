# User Personas — Test Data
# Credentials are resolved from .env at runtime — never hardcode passwords here.
# Referenced as: ${testdata.users.<key>.<field>}
# Example: ${testdata.users.admin1.email}

admin1:
  email: "${env.ADMIN_EMAIL}"
  password: "${env.ADMIN_PASSWORD}"
  role: admin
  display_name: "Admin User"

user1:
  email: "${env.USER_EMAIL}"
  password: "${env.USER_PASSWORD}"
  role: user
  display_name: "Standard User"

